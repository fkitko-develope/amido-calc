<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>網戸 価格計算</title>

  <style>
    body {
      margin: 0;
      padding: 20px;
      font-family: sans-serif;
      background: #f5f5f5;
    }

    h2 {
      font-size: 22px;
      margin-bottom: 20px;
      text-align: center;
    }

    .container {
      background: #fff;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
      max-width: 500px;
      margin: 0 auto;
    }

    label {
      font-weight: bold;
      display: block;
      margin-top: 15px;
    }

    select, input {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      font-size: 16px;
      border-radius: 5px;
      border: 1px solid #ccc;
      box-sizing: border-box;
    }

    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }
    input[type=number] {
      -moz-appearance: textfield;
    }

    button {
      width: 100%;
      padding: 15px;
      margin-top: 20px;
      font-size: 18px;
      background: #007bff;
      color: #fff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }

    .result {
      margin-top: 20px;
      padding: 15px;
      background: #e8f5e9;
      border-left: 5px solid #4caf50;
      font-size: 18px;
      display: none;
    }
  </style>
</head>

<body>

  <h2>網戸 価格計算</h2>

  <div class="container">

    <label>種類</label>
    <select id="type">
      <option value="ロール式網戸">ロール式網戸</option>
      <option value="スライド式網戸">スライド式網戸</option>
    </select>

    <label>幅（W）</label>
    <input type="number" id="width" placeholder="例：780">

    <label>高さ（H）</label>
    <input type="number" id="height" placeholder="例：1230">

    <label>色調</label>
    <select id="color"></select>

    <label>浴室仕様</label>
    <select id="bath"></select>

    <button onclick="searchPrice()">価格を計算</button>

    <div id="price" class="result"></div>

  </div>

<!-- ★★★ ここに script を移動 ★★★ -->
<script>
const colorMaster = {
  "ロール式網戸": [
    { display: "単色：アイボリーホワイト（IW）", group: "単色" },
    { display: "単色：ピュアホワイト（PW）", group: "単色" },
    { display: "単色：ブロンズ（BR）", group: "単色" },
    { display: "木目：白木（N2）", group: "木目" },
    { display: "木目：チェリー（N3）", group: "木目" }
  ],
  "スライド式網戸": [
    { display: "単色：アイボリーホワイト（IW）", group: "単色" },
    { display: "単色：ブロンズ（BR）", group: "単色" },
    { display: "単色：シルバー（SL）", group: "単色" },
    { display: "単色：ブラック（BL）", group: "単色" },
    { display: "木目：ミルキーメイプル（MM）", group: "木目" },
    { display: "木目：アーモンドメイプル（AM）", group: "木目" },
    { display: "木目：チョコメイプル（CM）", group: "木目" }
  ]
};

const bathMaster = {
  "ロール式網戸": ["なし"],
  "スライド式網戸": ["なし", "浴室仕様"]
};

let priceList = [];

async function loadPriceList(type) {
  const url = type === "ロール式網戸"
    ? "/getPriceRoll"
    : "/getPriceSlide";

  const res = await fetch(url);
  priceList = await res.json();
}

function roundW(v) {
  const r = [400, 700, 1000, 1300];
  for (const x of r) if (v <= x) return x;
  return r[r.length - 1];
}

function roundH(v) {
  const r = [600, 1000, 1500, 2000, 2300];
  for (const x of r) if (v <= x) return x;
  return r[r.length - 1];
}

window.addEventListener("DOMContentLoaded", () => {

  const typeSel = document.getElementById("type");
  const colorSel = document.getElementById("color");
  const bathSel = document.getElementById("bath");

  typeSel.addEventListener("change", async () => {
    const type = typeSel.value;

    await loadPriceList(type);

    colorSel.innerHTML = "";
    colorMaster[type].forEach(c => {
      const opt = document.createElement("option");
      opt.value = c.group;
      opt.textContent = c.display;
      colorSel.appendChild(opt);
    });

    bathSel.innerHTML = "";
    bathMaster[type].forEach(b => {
      const opt = document.createElement("option");
      opt.value = b;
      opt.textContent = b;
      bathSel.appendChild(opt);
    });
  });

  typeSel.dispatchEvent(new Event("change"));
});

function searchPrice() {
  const type = document.getElementById("type").value;
  const W = roundW(Number(document.getElementById("width").value));
  const H = roundH(Number(document.getElementById("height").value));
  const colorGroup = document.getElementById("color").value;
  const bath = document.getElementById("bath").value;

  const hit = priceList.find(p =>
    p.type === type &&
    p.W === W &&
    p.H === H &&
    p.group === colorGroup &&
    p.bath === bath
  );

  const resultBox = document.getElementById("price");

  if (!hit) {
    resultBox.textContent = "該当する価格がありません";
    resultBox.style.display = "block";
    return;
  }

  resultBox.innerHTML =
    `サイズ：W ${W} × H ${H}<br>` +
    `定価：${hit.price.toLocaleString()}円<br>` +
    `単価：${hit.unit.toLocaleString()}円`;

  resultBox.style.display = "block";
}
</script>
<!-- ★★★ script はここまで ★★★ -->

</body>
</html>
