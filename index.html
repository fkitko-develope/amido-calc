<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>網戸 価格計算</title>
  <style>
    body { font-family: sans-serif; padding: 20px; }
    label { display: block; margin-top: 10px; }
    select, input { padding: 5px; margin-top: 5px; }
    #price { margin-top: 20px; font-size: 1.2em; font-weight: bold; }
  </style>
</head>
<body>

  <h2>網戸 価格計算</h2>

  <!-- 種類 -->
  <label>種類</label>
  <select id="type">
    <option value="ロール式網戸">ロール式網戸</option>
    <option value="スライド式網戸">スライド式網戸</option>
  </select>

  <!-- 幅 -->
  <label>幅（W）</label>
  <input type="number" id="width" placeholder="例：780">

  <!-- 高さ -->
  <label>高さ（H）</label>
  <input type="number" id="height" placeholder="例：1230">

  <!-- 色調 -->
  <label>色調</label>
  <select id="color"></select>

  <!-- 浴室仕様 -->
  <label>浴室仕様</label>
  <select id="bath"></select>

  <!-- 検索ボタン -->
  <div style="margin-top:20px;">
    <button onclick="searchPrice()">価格を計算</button>
  </div>

  <!-- 結果表示 -->
  <div id="price"></div>

<script>
// ------------------------------------------------------------
// PriceList（ロール式 / スライド式）
// ------------------------------------------------------------
let priceList = [];

// 種類に応じて PriceList を読み込む
async function loadPriceList(type) {
  const url = type === "ロール式網戸"
    ? "/functions/getPriceRoll"
    : "/functions/getPriceSlide";

  const res = await fetch(url);
  priceList = await res.json();
}

// ------------------------------------------------------------
// 色調マスタを API から取得
// ------------------------------------------------------------
async function loadColorList(type) {
  const res = await fetch(`/functions/getColor?type=${encodeURIComponent(type)}`);
  return await res.json();
}

// ------------------------------------------------------------
// 浴室仕様マスタを API から取得
// ------------------------------------------------------------
async function loadBathList(type) {
  const res = await fetch(`/functions/getBath?type=${encodeURIComponent(type)}`);
  return await res.json();
}

// ------------------------------------------------------------
// W/H の丸め処理
// ------------------------------------------------------------
function roundW(value) {
  const rules = [400, 700, 1000, 1300];
  for (const r of rules) if (value <= r) return r;
  return rules[rules.length - 1];
}

function roundH(value) {
  const rules = [600, 1000, 1500, 2000, 2300];
  for (const r of rules) if (value <= r) return r;
  return rules[rules.length - 1];
}

// ------------------------------------------------------------
// UI 初期化
// ------------------------------------------------------------
window.addEventListener("DOMContentLoaded", () => {
  setupTypeControl();
});

// ------------------------------------------------------------
// 種類変更 → 色調・浴室仕様・PriceList を更新
// ------------------------------------------------------------
function setupTypeControl() {
  const typeSel = document.getElementById("type");
  const colorSel = document.getElementById("color");
  const bathSel = document.getElementById("bath");

  typeSel.addEventListener("change", async () => {
    const type = typeSel.value;

    // --- PriceList 読み込み ---
    await loadPriceList(type);

    // --- 色調リスト更新（API） ---
    const colors = await loadColorList(type);
    colorSel.innerHTML = "";
    colors.forEach(c => {
      const opt = document.createElement("option");
      opt.value = c.group;
      opt.textContent = c.display;
      colorSel.appendChild(opt);
    });

    // --- 浴室仕様リスト更新（API） ---
    const baths = await loadBathList(type);
    bathSel.innerHTML = "";
    baths.forEach(b => {
      const opt = document.createElement("option");
      opt.value = b;
      opt.textContent = b;
      bathSel.appendChild(opt);
    });
  });

  // 初期実行
  typeSel.dispatchEvent(new Event("change"));
}

// ------------------------------------------------------------
// 価格検索
// ------------------------------------------------------------
async function searchPrice() {
  const type = document.getElementById("type").value;
  const wInput = Number(document.getElementById("width").value);
  const hInput = Number(document.getElementById("height").value);
  const colorGroup = document.getElementById("color").value;
  const bath = document.getElementById("bath").value;

  // 丸め処理
  const W = roundW(wInput);
  const H = roundH(hInput);

  // PriceList から検索
  const hit = priceList.find(p =>
    p.type === type &&
    p.W === W &&
    p.H === H &&
    p.group === colorGroup &&
    p.bath === bath
  );

  if (!hit) {
    document.getElementById("price").textContent = "該当する価格がありません";
    return;
  }

  document.getElementById("price").textContent =
    `定価：${hit.price}円　単価：${hit.unit}円`;
}
</script>

</body>
</html>
