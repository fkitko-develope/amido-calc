<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>網戸 価格計算</title>

  <style>
    body {
      margin: 0;
      padding: 20px;
      font-family: sans-serif;
      background: #f5f5f5;
    }

    h1 {
      font-size: 22px;
      margin-bottom: 20px;
      text-align: center;
    }

    .container {
      background: #fff;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    label {
      font-weight: bold;
      display: block;
      margin-top: 15px;
    }

    select, input {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      font-size: 16px;
      border-radius: 5px;
      border: 1px solid #ccc;
    }

    button {
      width: 100%;
      padding: 15px;
      margin-top: 20px;
      font-size: 18px;
      background: #007bff;
      color: #fff;
      border: none;
      border-radius: 8px;
    }

    .result {
      margin-top: 20px;
      padding: 15px;
      background: #e8f5e9;
      border-left: 5px solid #4caf50;
      font-size: 18px;
    }
  </style>
</head>

<body>
  <h1>網戸 価格計算</h1>

  <div class="container">

    <label>種類</label>
    <select id="type">
      <option value="ロール式網戸">ロール式網戸</option>
    </select>

    <label>幅（W）</label>
    <input type="number" id="width" placeholder="幅を入力">

    <label>高さ（H）</label>
    <input type="number" id="height" placeholder="高さを入力">

    <label>色調</label>
    <select id="color"></select>

    <label>浴室仕様</label>
    <select id="bath"></select>

    <button onclick="calcPrice()">価格を計算</button>

    <div id="result" class="result" style="display:none;"></div>
  </div>

  <script>
    // ------------------------------------------------------------
    // PriceList（ロール式 / スライド式）
    // ------------------------------------------------------------
    let priceList = [];
    
    // 種類に応じて PriceList を読み込む
    async function loadPriceList(type) {
      const url = type === "ロール式網戸"
        ? "/functions/getPriceRoll"
        : "/functions/getPriceSlide";
    
      const res = await fetch(url);
      priceList = await res.json();
    }
    
    // ------------------------------------------------------------
    // 色調マスタを API から取得
    // ------------------------------------------------------------
    async function loadColorList(type) {
      const res = await fetch(`/functions/getColor?type=${encodeURIComponent(type)}`);
      return await res.json();   // [{display:"単色：アイボリーホワイト（IW）", group:"単色"}, ...]
    }
    
    // ------------------------------------------------------------
    // 浴室仕様マスタを API から取得
    // ------------------------------------------------------------
    async function loadBathList(type) {
      const res = await fetch(`/functions/getBath?type=${encodeURIComponent(type)}`);
      return await res.json();   // ["なし", "浴室仕様"]
    }
    
    // ------------------------------------------------------------
    // W/H の丸め処理
    // ------------------------------------------------------------
    function roundW(value) {
      const rules = [400, 700, 1000, 1300];
      for (const r of rules) if (value <= r) return r;
      return rules[rules.length - 1];
    }
    
    function roundH(value) {
      const rules = [600, 1000, 1500, 2000, 2300];
      for (const r of rules) if (value <= r) return r;
      return rules[rules.length - 1];
    }
    
    // ------------------------------------------------------------
    // UI 初期化
    // ------------------------------------------------------------
    window.addEventListener("DOMContentLoaded", () => {
      setupTypeControl();
    });
    
    // ------------------------------------------------------------
    // 種類変更 → 色調・浴室仕様・PriceList を更新
    // ------------------------------------------------------------
    function setupTypeControl() {
      const typeSel = document.getElementById("type");
      const colorSel = document.getElementById("color");
      const bathSel = document.getElementById("bath");
    
      typeSel.addEventListener("change", async () => {
        const type = typeSel.value;
    
        // --- PriceList 読み込み ---
        await loadPriceList(type);
    
        // --- 色調リスト更新（API） ---
        const colors = await loadColorList(type);
        colorSel.innerHTML = "";
        colors.forEach(c => {
          const opt = document.createElement("option");
          opt.value = c.group; // 単色 / 木目
          opt.textContent = c.display;
          colorSel.appendChild(opt);
        });
    
        // --- 浴室仕様リスト更新（API） ---
        const baths = await loadBathList(type);
        bathSel.innerHTML = "";
        baths.forEach(b => {
          const opt = document.createElement("option");
          opt.value = b;
          opt.textContent = b;
          bathSel.appendChild(opt);
        });
      });
    
      // 初期実行
      typeSel.dispatchEvent(new Event("change"));
    }
    
    // ------------------------------------------------------------
    // 価格検索
    // ------------------------------------------------------------
    async function searchPrice() {
      const type = document.getElementById("type").value;
      const wInput = Number(document.getElementById("width").value);
      const hInput = Number(document.getElementById("height").value);
      const colorGroup = document.getElementById("color").value;
      const bath = document.getElementById("bath").value;
    
      // 丸め処理
      const W = roundW(wInput);
      const H = roundH(hInput);
    
      // PriceList から検索
      const hit = priceList.find(p =>
        p.type === type &&
        p.W === W &&
        p.H === H &&
        p.group === colorGroup &&
        p.bath === bath
      );
    
      if (!hit) {
        alert("該当する価格がありません");
        return;
      }
    
      document.getElementById("price").textContent =
        `定価：${hit.price}円　単価：${hit.unit}円`;
    }
    </script>
    

</body>
</html>
